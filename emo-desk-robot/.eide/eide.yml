version: "4.1"
name: b-1
type: ARM
deviceName: STM32F407ZGTx
packDir: .pack/Keil/STM32F4xx_DFP.2.15.0
srcDirs:
  - src
  - cmsis
  - setup
  - stl_lib
  - head
  - system
virtualFolder:
  name: <virtual_root>
  files: []
  folders: []
dependenceList: []
outDir: build
miscInfo:
  uid: 066683cf8385c3896d2370b15fb0408d
targets:
  Debug:
    cppPreprocessAttrs:
      defineList:
        - STM32F40_41xxx
        - USE_STDPERIPH_DRIVER
        - STM32F407xx
      incList:
        - .
        - stl_lib/inc
        - stl_lib/src
        - src
        - setup
        - cmsis
        - head
        - system
        - head/manager
      libList: []
    excludeList: []
    settings: {}
    toolchain: AC6
    toolchainConfigMap:
      AC5:
        archExtensions: ""
        cpuType: Cortex-M4
        floatingPointHardware: single
        options:
          version: 4
          afterBuildTasks: []
          asm-compiler: {}
          beforeBuildTasks: []
          c/cpp-compiler:
            CXX_FLAGS: --diag_suppress=1 --diag_suppress=1295 --diag_suppress=47
            C_FLAGS: --diag_suppress=1 --diag_suppress=1295 --diag_suppress=47
            c99-mode: true
            one-elf-section-per-function: true
            optimization: level-3
            warnings: unspecified
          global:
            output-debug-info: enable
          linker:
            $outputTaskExcludes:
              - .bin
            output-format: elf
        scatterFilePath: <YOUR_SCATTER_FILE>.sct
        storageLayout:
          RAM:
            - id: 1
              isChecked: true
              mem:
                size: "0x20000"
                startAddr: "0x20000000"
              noInit: false
              tag: IRAM
          ROM:
            - id: 1
              isChecked: true
              isStartup: true
              mem:
                size: "0x10000"
                startAddr: "0x08000000"
              tag: IROM
        useCustomScatterFile: false
      AC6:
        archExtensions: ""
        cpuType: Cortex-M4
        floatingPointHardware: single
        options:
          version: 3
          afterBuildTasks: []
          asm-compiler:
            $use: asm-auto
          beforeBuildTasks: []
          c/cpp-compiler:
            CXX_FLAGS: -Wno-macro-redefined -std=c++11
            C_FLAGS: -Wno-macro-redefined
            language-c: c99
            language-cpp: c++14
            misc-controls: -Wno-macro-redefined
            optimization: level-3
            short-enums#wchar: true
            warnings: ac5-like-warnings
          global:
            output-debug-info: enable
          linker:
            $outputTaskExcludes:
              - .bin
            misc-controls: --diag_suppress=L6329
            output-format: elf
        scatterFilePath: <YOUR_SCATTER_FILE>.sct
        storageLayout:
          RAM:
            - id: 1
              isChecked: true
              mem:
                size: "0x20000"
                startAddr: "0x20000000"
              noInit: false
              tag: IRAM
            - id: 2
              isChecked: false
              mem:
                size: "0x10000"
                startAddr: "0x10000000"
              noInit: false
              tag: IRAM
          ROM:
            - id: 1
              isChecked: true
              isStartup: true
              mem:
                size: "0x100000"
                startAddr: "0x08000000"
              tag: IROM
        useCustomScatterFile: false
      GCC:
        archExtensions: ""
        cpuType: Cortex-M3
        floatingPointHardware: none
        options:
          version: 5
          afterBuildTasks: []
          asm-compiler:
            ASM_FLAGS: ""
          beforeBuildTasks: []
          c/cpp-compiler:
            CXX_FLAGS: ""
            C_FLAGS: ""
            language-c: c11
            language-cpp: c++11
            one-elf-section-per-data: true
            one-elf-section-per-function: true
            optimization: level-debug
            warnings: all-warnings
          global:
            $float-abi-type: hard
            misc-control: ""
            not-use-syscalls: true
            output-debug-info: enable
            use-newlib-nano: true
          linker:
            $outputTaskExcludes:
              - .bin
            LD_FLAGS: ""
            LIB_FLAGS: -lm
            output-format: elf
            remove-unused-input-sections: true
        scatterFilePath: <YOUR_LINKER_SCRIPT>.lds
        storageLayout:
          RAM: []
          ROM: []
        useCustomScatterFile: true
    uploadConfigMap:
      JLink:
        baseAddr: ""
        bin: ""
        cpuInfo:
          cpuName: "null"
          vendor: "null"
        otherCmds: ""
        proType: 1
        speed: 8000
      OpenOCD:
        baseAddr: "0x08000000"
        bin: ""
        interface: cmsis-dap
        target: stm32f4x
      STLink:
        address: "0x08000000"
        bin: ""
        elFile: None
        optionBytes: .eide/debug.st.option.bytes.ini
        otherCmds: ""
        proType: SWD
        resetMode: default
        runAfterProgram: true
        speed: 4000
    uploader: OpenOCD
